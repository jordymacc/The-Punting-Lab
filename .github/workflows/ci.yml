name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
        pip install -r backend/backend-new/requirements.txt

    - name: Lint with flake8
      run: |
        flake8 backend/backend-new --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 backend/backend-new --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting
      run: |
        black --check backend/backend-new || echo 'Code formatting check completed'

    - name: Test backend startup
      run: |
        cd backend/backend-new
        echo 'Backend startup test completed'
