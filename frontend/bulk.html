<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Result Entry</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 4px;
        }
        .header p {
            color: #888;
            font-size: 14px;
        }
        .nav {
            text-align: center;
            margin-bottom: 20px;
        }
        .nav a {
            color: #6c9fff;
            text-decoration: none;
            font-size: 14px;
        }
        .nav a:hover { text-decoration: underline; }
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .controls label {
            font-size: 14px;
            color: #aaa;
        }
        .controls input[type="date"] {
            background: #1a1d27;
            border: 1px solid #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }
        .controls button {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .controls button:hover { background: #2563eb; }
        .controls button:disabled { background: #555; cursor: not-allowed; }
        .btn-save {
            background: #10b981 !important;
            font-size: 16px !important;
            padding: 10px 32px !important;
        }
        .btn-save:hover { background: #059669 !important; }
        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat {
            background: #1a1d27;
            border: 1px solid #2a2d37;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 13px;
        }
        .stat span { color: #6c9fff; font-weight: 600; }
        .race-card {
            background: #1a1d27;
            border: 1px solid #2a2d37;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .race-card.resulted {
            border-color: #10b981;
            background: #0d1f17;
        }
        .race-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .race-card-header h3 {
            font-size: 15px;
            color: #fff;
        }
        .race-card-header .badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        .badge-pending {
            background: #f59e0b22;
            color: #f59e0b;
            border: 1px solid #f59e0b44;
        }
        .badge-resulted {
            background: #10b98122;
            color: #10b981;
            border: 1px solid #10b98144;
        }
        .badge-win { background: #10b98122; color: #10b981; border: 1px solid #10b98144; }
        .badge-placed { background: #3b82f622; color: #3b82f6; border: 1px solid #3b82f644; }
        .badge-lost { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }
        .result-row {
            display: grid;
            grid-template-columns: 60px 1fr 1fr 1fr;
            gap: 8px;
            align-items: center;
        }
        .result-row label {
            font-size: 12px;
            color: #888;
            font-weight: 500;
        }
        .result-row select {
            background: #12141c;
            border: 1px solid #333;
            color: #fff;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            width: 100%;
        }
        .result-row select:focus {
            border-color: #3b82f6;
            outline: none;
        }
        .model-pick {
            font-size: 12px;
            color: #f59e0b;
            margin-top: 8px;
        }
        .model-pick strong { color: #fbbf24; }
        .saved-result {
            font-size: 13px;
            margin-top: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            background: #00000044;
        }
        .saved-result .winner { color: #10b981; font-weight: 600; }
        .saved-result .second { color: #6c9fff; }
        .saved-result .third { color: #a78bfa; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            display: none;
        }
        .toast-success { background: #10b981; color: #fff; }
        .toast-error { background: #ef4444; color: #fff; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 14px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .empty p { margin-bottom: 8px; }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
        .checkbox-row label {
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📋 Bulk Result Entry</h1>
    <p>Enter results for multiple races at once</p>
</div>

<div class="nav">
    <a href="/">← Back to Dashboard</a>
</div>

<div class="controls">
    <label for="dateInput">Date:</label>
    <input type="date" id="dateInput">
    <button onclick="loadRaces()">Load Races</button>
    <button class="btn-save" onclick="saveAll()" id="saveBtn" disabled>💾 Save All Results</button>
</div>

<div class="checkbox-row">
    <input type="checkbox" id="hideResulted" checked>
    <label for="hideResulted">Hide already resulted races</label>
</div>

<div class="stats-bar" id="statsBar" style="display:none;">
    <div class="stat">Races: <span id="statTotal">0</span></div>
    <div class="stat">Resulted: <span id="statResulted">0</span></div>
    <div class="stat">Pending: <span id="statPending">0</span></div>
</div>

<div id="raceList">
    <div class="loading">Select a date and click Load Races</div>
</div>

<div class="toast" id="toast"></div>

<script>
    const dateInput = document.getElementById('dateInput');
    const raceList = document.getElementById('raceList');
    const saveBtn = document.getElementById('saveBtn');
    const hideResulted = document.getElementById('hideResulted');

    // Default to today
    dateInput.value = new Date().toISOString().split('T')[0];

    let races = [];
    let existingResults = [];
    let overlays = [];

    hideResulted.addEventListener('change', renderRaces);

    async function loadRaces() {
        const date = dateInput.value;
        if (!date) return;

        raceList.innerHTML = '<div class="loading">Loading...</div>';
        saveBtn.disabled = true;

        try {
            const [racesRes, resultsRes, overlaysRes] = await Promise.all([
                fetch('/api/races'),
                fetch('/api/results'),
                fetch('/api/overlays'),
            ]);

            const racesData = await racesRes.json();
            const resultsData = await resultsRes.json();
            const overlaysData = await overlaysRes.json();

            // Filter races for selected date
            const dateSuffix = `_${date}`;
            races = (racesData.races || []).filter(r =>
                r.race_id && r.race_id.endsWith(dateSuffix)
            );

            existingResults = resultsData.results || [];
            overlays = overlaysData.overlays || [];

            // Sort by track then race number
            races.sort((a, b) => {
                if (a.track !== b.track) return a.track.localeCompare(b.track);
                return (a.race_number || 0) - (b.race_number || 0);
            });

            renderRaces();

        } catch (e) {
            raceList.innerHTML = `<div class="empty"><p>❌ Error loading data</p><p>${e.message}</p></div>`;
        }
    }

    function getResultForRace(raceId) {
        return existingResults.find(r => r.race_id === raceId);
    }

    function getModelPick(track, raceNumber) {
        const match = overlays.find(o =>
            o.track === track && o.race_number === raceNumber
        );
        return match ? match.horse_name : '';
    }

    function renderRaces() {
        const hide = hideResulted.checked;

        if (races.length === 0) {
            raceList.innerHTML = '<div class="empty"><p>📭 No races found for this date</p><p>Make sure the server has scraped races for this date</p></div>';
            document.getElementById('statsBar').style.display = 'none';
            return;
        }

        let resultedCount = 0;
        let html = '';

        for (const race of races) {
            const result = getResultForRace(race.race_id);
            const isResulted = !!result;
            if (isResulted) resultedCount++;

            if (hide && isResulted) continue;

            const modelPick = getModelPick(race.track, race.race_number);
            const horses = (race.horses || []).map(h => h.horse_name).filter(Boolean);
            horses.sort();

            html += `<div class="race-card ${isResulted ? 'resulted' : ''}">`;
            html += `<div class="race-card-header">`;
            html += `<h3>🏟️ ${race.track} — R${race.race_number} ${race.race_name || ''}</h3>`;

            if (isResulted) {
                let badgeClass = 'badge-lost';
                let badgeText = '❌ LOST';
                if (result.model_top_pick_won) {
                    badgeClass = 'badge-win';
                    badgeText = '✅ WIN';
                } else if (result.model_top_pick_placed) {
                    badgeClass = 'badge-placed';
                    badgeText = '📍 PLACED';
                }
                html += `<span class="badge ${badgeClass}">${badgeText}</span>`;
            } else {
                html += `<span class="badge badge-pending">PENDING</span>`;
            }
            html += `</div>`;

            if (modelPick) {
                html += `<div class="model-pick">🤖 Model top pick: <strong>${modelPick}</strong></div>`;
            }

            if (isResulted) {
                html += `<div class="saved-result">`;
                html += `🥇 <span class="winner">${result.winner}</span> &nbsp; `;
                html += `🥈 <span class="second">${result.second}</span> &nbsp; `;
                html += `🥉 <span class="third">${result.third}</span>`;
                html += `</div>`;
            } else {
                html += `<div class="result-row">`;
                html += `<label>🥇 1st</label>`;
                html += `<select id="w_${race.race_id}"><option value="">— Select —</option>`;
                for (const h of horses) {
                    html += `<option value="${h}">${h}</option>`;
                }
                html += `</select>`;

                html += `<label>🥈 2nd</label>`;
                html += `<select id="s_${race.race_id}"><option value="">— Select —</option>`;
                for (const h of horses) {
                    html += `<option value="${h}">${h}</option>`;
                }
                html += `</select>`;
                html += `</div>`;

                html += `<div class="result-row" style="margin-top:8px;">`;
                html += `<label>🥉 3rd</label>`;
                html += `<select id="t_${race.race_id}"><option value="">— Select —</option>`;
                for (const h of horses) {
                    html += `<option value="${h}">${h}</option>`;
                }
                html += `</select>`;
                html += `<div></div>`;
                html += `</div>`;
            }

            html += `</div>`;
        }

        raceList.innerHTML = html;

        // Update stats
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('statTotal').textContent = races.length;
        document.getElementById('statResulted').textContent = resultedCount;
        document.getElementById('statPending').textContent = races.length - resultedCount;

        saveBtn.disabled = false;
    }

    async function saveAll() {
        const date = dateInput.value;
        const results = [];

        for (const race of races) {
            const result = getResultForRace(race.race_id);
            if (result) continue; // Skip already resulted

            const wEl = document.getElementById(`w_${race.race_id}`);
            const sEl = document.getElementById(`s_${race.race_id}`);
            const tEl = document.getElementById(`t_${race.race_id}`);

            if (!wEl) continue;

            const winner = wEl.value;
            const second = sEl.value;
            const third = tEl.value;

            if (!winner) continue; // Skip if no winner selected

            results.push({
                track: race.track,
                race_number: race.race_number,
                race_date: date,
                winner,
                second,
                third,
            });
        }

        if (results.length === 0) {
            showToast('No new results to save', 'error');
            return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = '⏳ Saving...';

        try {
            const res = await fetch('/api/bulk-results', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ results }),
            });
            const data = await res.json();

            if (data.success) {
                showToast(`✅ Saved ${data.saved} results! (${data.skipped} skipped)`, 'success');
                // Reload to update badges
                await loadRaces();
            } else {
                showToast(`❌ Error: ${data.error}`, 'error');
            }
        } catch (e) {
            showToast(`❌ Error: ${e.message}`, 'error');
        }

        saveBtn.disabled = false;
        saveBtn.textContent = '💾 Save All Results';
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast toast-${type}`;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    // Auto-load on page open
    loadRaces();
</script>

</body>
</html>
