services:
  - type: web
    name: punting-lab-backend
    runtime: python
    pythonVersion: "3.11.0"
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
